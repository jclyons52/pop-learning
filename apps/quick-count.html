<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Quick Count · Pop Learning</title>
<link rel="stylesheet" href="../shared/pop.css" />
<style>
  /* flash card holds the objects briefly, then hides them */
  #card{ aspect-ratio:1/0.92; gap:10px; }
  .flash{
    display:flex; flex-wrap:wrap; gap:clamp(6px,2.4vw,14px);
    justify-content:center; align-content:center;
    max-width:88%;
  }
  .flash .obj{ font-size:clamp(2rem,9vw,3.2rem); line-height:1; }
  .flash.hidden{ display:none; }
  .qmark{
    color:#fff; font-weight:700; line-height:.9;
    text-shadow:0 5px 0 rgba(0,0,0,.14);
    font-size:clamp(4rem,22vw,7rem);
    display:none;
  }
  .qmark.show{ display:block; }
  .again{
    margin-top:6px; border:none; cursor:pointer;
    background:rgba(255,255,255,.92); color:var(--ink);
    font-family:var(--font); font-weight:700; font-size:clamp(.95rem,4vw,1.2rem);
    border-radius:999px; padding:9px 18px; box-shadow:0 4px 0 rgba(0,0,0,.14);
    display:inline-flex; align-items:center; gap:8px;
  }
  .again:active{ transform:translateY(4px); box-shadow:0 0 0 rgba(0,0,0,.14); }

  .choices{
    display:grid; grid-template-columns:repeat(3, 1fr);
    gap:clamp(8px,3vw,16px);
    width:min(86vw, 420px);
  }
  .choice{
    border:none; cursor:pointer;
    aspect-ratio:1/1; border-radius:22px;
    background:#fff; color:var(--ink);
    font-family:var(--font); font-weight:700;
    font-size:clamp(2.4rem,12vw,3.6rem); line-height:1;
    display:grid; place-items:center;
    box-shadow:0 7px 0 var(--shadow);
    transition:transform .1s ease, box-shadow .1s ease, background .15s ease;
  }
  .choice:active{ transform:translateY(5px); box-shadow:0 2px 0 var(--shadow); }
  .choice:focus-visible{ outline:3px solid #4DABF7; outline-offset:2px; }
  .choice.correct{ background:#37B24D; color:#fff; box-shadow:0 7px 0 #2B8A3E; animation:pop .42s cubic-bezier(.34,1.56,.64,1); }
  .choice.wrong{ background:#FA5252; color:#fff; box-shadow:0 7px 0 #D23B3B; animation:shake .4s; }
  .choice.dim{ opacity:.35; pointer-events:none; }
  @keyframes shake{ 0%,100%{ transform:translateX(0); } 20%{ transform:translateX(-7px); } 40%{ transform:translateX(7px); } 60%{ transform:translateX(-5px); } 80%{ transform:translateX(5px); } }

  .scorebar{ display:flex; align-items:center; gap:16px; font-weight:600; }
  .score{ font-size:1rem; color:var(--ink); }
</style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <a class="home" href="../index.html" aria-label="Back to all apps">🏠</a>
      <div class="titles">
        <h1>Quick&nbsp;<span>Count</span></h1>
        <p>How many did you see?</p>
      </div>
    </div>
    <div class="controls">
      <button class="ctrl" id="soundBtn" aria-pressed="true" aria-label="Toggle sound">🔊 Sound</button>
    </div>
  </header>

  <main class="stage">
    <button class="card" id="card" aria-label="Quick count card">
      <div class="flash" id="flash"></div>
      <span class="qmark" id="qmark">?</span>
      <span class="again" id="again">👀 Show again</span>
    </button>
    <div class="choices" id="choices" aria-label="Tap how many you saw"></div>
    <div class="tap-hint" id="hint">👆 how many did you see?</div>
  </main>

  <footer class="bottom">
    <div class="scorebar">
      <span class="score" id="score">⭐ 0</span>
      <span class="counter" id="counter">1 / 10</span>
    </div>
    <div class="progress"><i id="bar"></i></div>
  </footer>

<script src="../shared/pop.js"></script>
<script src="../shared/data.js"></script>
<script>
(function(){
  "use strict";
  var $ = Pop.$;
  var WORDS = Pop.data.numberWords;
  var OBJECTS = Pop.data.countObjects;
  var ROUNDS = 10, MAXN = 6;

  var pos = 0, score = 0, locked = false;
  var count = 0, obj = "🍎", flashTimer = null;
  var card=$("card"), flash=$("flash"), qmark=$("qmark"), again=$("again"),
      choicesEl=$("choices"), hint=$("hint"), scoreEl=$("score"),
      counter=$("counter"), bar=$("bar");

  function showFlash(){
    if(flashTimer){ clearTimeout(flashTimer); flashTimer = null; }
    qmark.classList.remove("show");
    flash.classList.remove("hidden");
    flash.innerHTML = "";
    for(var i=0;i<count;i++){
      flash.appendChild(Pop.el("span", { "class":"obj", text: obj }));
    }
    flashTimer = setTimeout(function(){
      flash.classList.add("hidden");
      qmark.classList.add("show");
    }, 1300);
  }

  function newRound(){
    locked = false;
    count = 1 + Math.floor(Math.random() * MAXN);
    obj = OBJECTS[Math.floor(Math.random() * OBJECTS.length)];
    var col = Pop.color(pos);
    card.style.setProperty("--c", col[0]);
    card.style.setProperty("--c-dark", col[1]);

    // build 3 number choices: the count + 2 distractors near it
    var pool = [];
    for(var n=1; n<=MAXN; n++){ if(n !== count) pool.push(n); }
    pool = Pop.shuffle(pool).slice(0, 2);
    var set = Pop.shuffle(pool.concat([count]));

    choicesEl.innerHTML = "";
    set.forEach(function(num){
      var b = Pop.el("button", { "class":"choice", text: String(num), "aria-label": String(num) });
      b.addEventListener("click", function(){ choose(b, num); });
      choicesEl.appendChild(b);
    });

    hint.textContent = "👆 how many did you see?";
    counter.textContent = (pos+1) + " / " + ROUNDS;
    bar.style.width = ((pos+1)/ROUNDS*100) + "%";
    showFlash();
  }

  function choose(btn, num){
    if(locked) return;
    var correct = (num === count);
    Pop.progress.record("subitise", String(count), correct);
    if(correct){
      locked = true;
      if(flashTimer){ clearTimeout(flashTimer); flashTimer = null; }
      btn.classList.add("correct");
      Pop.sparkle(card);
      score++; scoreEl.textContent = "⭐ " + score;
      Pop.speak("Yes! " + WORDS[count-1] + "!");
      setTimeout(next, 1100);
    } else {
      btn.classList.add("wrong", "dim");
      hint.textContent = "Not quite — have another look!";
      Pop.speak("Try again.");
      setTimeout(function(){ btn.classList.remove("wrong"); }, 420);
    }
  }

  function next(){
    pos++;
    if(pos >= ROUNDS){
      Pop.sparkle(card);
      Pop.speak("Great counting!");
      pos = 0;
    }
    newRound();
  }

  again.addEventListener("click", function(e){ e.stopPropagation(); showFlash(); });
  card.addEventListener("click", showFlash);

  var soundBtn = $("soundBtn");
  soundBtn.setAttribute("aria-pressed", String(Pop.getSound()));
  soundBtn.innerHTML = Pop.getSound() ? "🔊 Sound" : "🔇 Sound";
  soundBtn.addEventListener("click", function(){
    var on = !Pop.getSound(); Pop.setSound(on);
    this.setAttribute("aria-pressed", String(on));
    this.innerHTML = on ? "🔊 Sound" : "🔇 Sound";
  });

  newRound();
})();
</script>
</body>
</html>
