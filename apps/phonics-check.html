<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Phonics Check · Pop Learning</title>
<link rel="stylesheet" href="../shared/pop.css" />
<style>
  /* word card: one big lowercase word */
  #card{ aspect-ratio:1/0.78; gap:10px; }
  .bigword{
    font-size:clamp(3rem,16vw,5.4rem); line-height:1;
    font-weight:700; text-transform:lowercase; color:#fff;
    letter-spacing:1px;
    text-shadow:0 3px 0 rgba(0,0,0,.14);
  }
  .reveal-tag{
    display:inline-flex; align-items:center; gap:8px;
    background:rgba(255,255,255,.92); color:var(--ink);
    font-family:var(--font); font-weight:700; font-size:clamp(.85rem,3.6vw,1.05rem);
    border-radius:999px; padding:7px 16px; box-shadow:0 4px 0 rgba(0,0,0,.12);
    opacity:0; transform:translateY(8px) scale(.9);
    transition:opacity .25s ease, transform .25s ease;
  }
  .reveal-tag.show{ opacity:1; transform:none; }

  .marks{ display:flex; gap:clamp(10px,4vw,18px); flex-wrap:wrap; justify-content:center; }
  .mark{
    border:none; cursor:pointer;
    font-family:var(--font); font-weight:700; font-size:clamp(1rem,4.4vw,1.3rem);
    border-radius:999px; padding:13px 22px;
    display:inline-flex; align-items:center; gap:8px;
    transition:transform .08s ease, box-shadow .08s ease;
  }
  .mark:active{ transform:translateY(5px); }
  .mark:focus-visible{ outline:3px solid #4DABF7; outline-offset:2px; }
  .mark.read{ background:#37B24D; color:#fff; box-shadow:0 6px 0 #2B8A3E; }
  .mark.read:active{ box-shadow:0 1px 0 #2B8A3E; }
  .mark.tricky{ background:#FFD43B; color:var(--ink); box-shadow:0 6px 0 #E0B400; }
  .mark.tricky:active{ box-shadow:0 1px 0 #E0B400; }

  .scorebar{ display:flex; align-items:center; gap:16px; font-weight:600; }
  .score{ font-size:1rem; color:var(--ink); }
</style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <a class="home" href="../index.html" aria-label="Back to all apps">🏠</a>
      <div class="titles">
        <h1>Phonics&nbsp;<span>Check</span></h1>
        <p>Read the word out loud</p>
      </div>
    </div>
    <div class="controls">
      <button class="ctrl" id="filterBtn" aria-label="Filter words">📚 All</button>
      <button class="ctrl" id="soundBtn" aria-pressed="true" aria-label="Toggle sound">🔊 Sound</button>
    </div>
  </header>

  <main class="stage">
    <button class="card" id="card" aria-label="Hear the word">
      <span class="bigword" id="bigword">cat</span>
      <span class="reveal-tag" id="tag"></span>
    </button>
    <div class="tap-hint">👆 sound it out and read it aloud — some are silly made-up words!</div>

    <div class="marks">
      <button class="mark read" id="readBtn" aria-label="I read it">✅ I read it!</button>
      <button class="mark tricky" id="trickyBtn" aria-label="That was tricky">🤔 Tricky</button>
    </div>

    <div class="nav">
      <button class="arrow" id="prevBtn" aria-label="Previous word">←</button>
      <button class="say" id="hearBtn" aria-label="Hear the word">🔊 Hear it</button>
      <button class="arrow" id="nextBtn" aria-label="Next word">→</button>
    </div>
  </main>

  <footer class="bottom">
    <div class="scorebar">
      <span class="score" id="score">⭐ 0</span>
      <span class="counter" id="counter">1 / 18</span>
    </div>
    <div class="progress"><i id="bar"></i></div>
  </footer>

<script src="../shared/pop.js"></script>
<script src="../shared/data.js"></script>
<script>
(function(){
  "use strict";
  var $ = Pop.$;
  var ALL = Pop.data.phonicsCheck;

  var FILTERS = [
    { label:"📚 All",   test:function(){ return true; } },
    { label:"📗 Real",  test:function(w){ return w.real; } },
    { label:"👾 Silly", test:function(w){ return !w.real; } }
  ];
  var filterIdx = 0;

  var pool = ALL.slice();
  var pos = 0, score = 0, locked = false;

  var card=$("card"), bigword=$("bigword"), tag=$("tag"),
      scoreEl=$("score"), counter=$("counter"), bar=$("bar");

  function applyFilter(){
    pool = ALL.filter(FILTERS[filterIdx].test);
    if(!pool.length) pool = ALL.slice();
    pos = 0;
  }

  function current(){ return pool[pos]; }

  function speakWord(){ Pop.speak(current().word); }

  function render(animate){
    locked = false;
    var w = current(), col = Pop.color(pos);
    card.style.setProperty("--c", col[0]);
    card.style.setProperty("--c-dark", col[1]);
    bigword.textContent = w.word;
    tag.classList.remove("show");
    tag.textContent = "";
    counter.textContent = (pos+1) + " / " + pool.length;
    bar.style.width = ((pos+1)/pool.length*100) + "%";
    if(animate){ card.classList.remove("pop"); void card.offsetWidth; card.classList.add("pop"); }
  }

  function reveal(w){
    tag.textContent = w.real ? "📗 a real word" : "👾 a silly made-up word";
    tag.classList.add("show");
  }

  function mark(readIt){
    if(locked) return;
    locked = true;
    var w = current();
    Pop.progress.record("phonics-check", w.word, readIt);
    reveal(w);
    if(readIt){
      score++; scoreEl.textContent = "⭐ " + score;
      Pop.sparkle(card);
    }
    setTimeout(function(){ go(1); }, 1100);
  }

  function go(dir){ pos = (pos + dir + pool.length) % pool.length; render(true); }

  card.addEventListener("click", speakWord);
  $("hearBtn").addEventListener("click", speakWord);
  $("readBtn").addEventListener("click", function(){ mark(true); });
  $("trickyBtn").addEventListener("click", function(){ mark(false); });
  $("prevBtn").addEventListener("click", function(){ go(-1); });
  $("nextBtn").addEventListener("click", function(){ go(1); });

  $("filterBtn").addEventListener("click", function(){
    filterIdx = (filterIdx + 1) % FILTERS.length;
    this.textContent = FILTERS[filterIdx].label;
    applyFilter();
    render(true);
  });

  var soundBtn = $("soundBtn");
  soundBtn.setAttribute("aria-pressed", String(Pop.getSound()));
  soundBtn.innerHTML = Pop.getSound() ? "🔊 Sound" : "🔇 Sound";
  soundBtn.addEventListener("click", function(){
    var on = !Pop.getSound(); Pop.setSound(on);
    this.setAttribute("aria-pressed", String(on));
    this.innerHTML = on ? "🔊 Sound" : "🔇 Sound";
  });

  Pop.onArrows(function(){go(-1);}, function(){go(1);}, speakWord);
  render(false);
})();
</script>
</body>
</html>
