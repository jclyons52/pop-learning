<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Add &amp; Take · Pop Learning</title>
<link rel="stylesheet" href="../shared/pop.css" />
<style>
  #card{ aspect-ratio:1/0.92; gap:10px; }
  .sum{
    color:#fff; font-weight:700; line-height:.9;
    text-shadow:0 5px 0 rgba(0,0,0,.14);
    font-size:clamp(2.4rem,12vw,4rem);
  }
  .objrow{
    display:flex; flex-wrap:wrap; gap:clamp(4px,1.6vw,9px);
    justify-content:center; align-content:center;
    max-width:90%;
  }
  .objrow .obj{ font-size:clamp(1.4rem,6.5vw,2.2rem); line-height:1; transition:opacity .2s ease; }
  .objrow .obj.gone{ opacity:.22; }
  .objrow .obj.gone::after{ content:""; }
  .prompt-say{
    margin-top:2px; border:none; cursor:pointer;
    background:rgba(255,255,255,.92); color:var(--ink);
    font-family:var(--font); font-weight:700; font-size:clamp(.95rem,4vw,1.2rem);
    border-radius:999px; padding:9px 18px; box-shadow:0 4px 0 rgba(0,0,0,.14);
    display:inline-flex; align-items:center; gap:8px;
  }
  .prompt-say:active{ transform:translateY(4px); box-shadow:0 0 0 rgba(0,0,0,.14); }

  .choices{
    display:grid; grid-template-columns:repeat(3, 1fr);
    gap:clamp(8px,3vw,16px);
    width:min(86vw, 420px);
  }
  .choice{
    border:none; cursor:pointer;
    aspect-ratio:1/1; border-radius:22px;
    background:#fff; color:var(--ink);
    font-family:var(--font); font-weight:700;
    font-size:clamp(2.4rem,12vw,3.6rem); line-height:1;
    display:grid; place-items:center;
    box-shadow:0 7px 0 var(--shadow);
    transition:transform .1s ease, box-shadow .1s ease, background .15s ease;
  }
  .choice:active{ transform:translateY(5px); box-shadow:0 2px 0 var(--shadow); }
  .choice:focus-visible{ outline:3px solid #4DABF7; outline-offset:2px; }
  .choice.correct{ background:#37B24D; color:#fff; box-shadow:0 7px 0 #2B8A3E; animation:pop .42s cubic-bezier(.34,1.56,.64,1); }
  .choice.wrong{ background:#FA5252; color:#fff; box-shadow:0 7px 0 #D23B3B; animation:shake .4s; }
  .choice.dim{ opacity:.35; pointer-events:none; }
  @keyframes shake{ 0%,100%{ transform:translateX(0); } 20%{ transform:translateX(-7px); } 40%{ transform:translateX(7px); } 60%{ transform:translateX(-5px); } 80%{ transform:translateX(5px); } }

  .scorebar{ display:flex; align-items:center; gap:16px; font-weight:600; }
  .score{ font-size:1rem; color:var(--ink); }
</style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <a class="home" href="../index.html" aria-label="Back to all apps">🏠</a>
      <div class="titles">
        <h1>Add&nbsp;&amp;&nbsp;<span>Take</span></h1>
        <p>Count to find the answer</p>
      </div>
    </div>
    <div class="controls">
      <button class="ctrl" id="rangeBtn" aria-pressed="false" aria-label="Change number range">to 10</button>
      <button class="ctrl" id="soundBtn" aria-pressed="true" aria-label="Toggle sound">🔊 Sound</button>
    </div>
  </header>

  <main class="stage">
    <button class="card" id="card" aria-label="Sum card. Tap to hear the question again.">
      <span class="sum" id="sum">3 + 2</span>
      <div class="objrow" id="objrow"></div>
      <span class="prompt-say">🔊 Say it again</span>
    </button>
    <div class="choices" id="choices" aria-label="Tap the answer"></div>
    <div class="tap-hint" id="hint">👆 what is the answer?</div>
  </main>

  <footer class="bottom">
    <div class="scorebar">
      <span class="score" id="score">⭐ 0</span>
      <span class="counter" id="counter">1 / 10</span>
    </div>
    <div class="progress"><i id="bar"></i></div>
  </footer>

<script src="../shared/pop.js"></script>
<script src="../shared/data.js"></script>
<script>
(function(){
  "use strict";
  var $ = Pop.$;
  var WORDS = Pop.data.numberWords;
  var OBJECTS = Pop.data.countObjects;
  var ROUNDS = 10;

  var pos = 0, score = 0, locked = false, range = 10;
  var a = 1, b = 1, op = "+", answer = 2, obj = "🍎";
  var card=$("card"), sumEl=$("sum"), objrow=$("objrow"), choicesEl=$("choices"),
      hint=$("hint"), scoreEl=$("score"), counter=$("counter"), bar=$("bar");

  function makeProblem(){
    op = Math.random() < 0.5 ? "+" : "−";
    if(op === "+"){
      // a + b <= range, both >= 1
      answer = 2 + Math.floor(Math.random() * (range - 1));   // 2..range
      a = 1 + Math.floor(Math.random() * (answer - 1));       // 1..answer-1
      b = answer - a;
    } else {
      // a - b, no negative, b >= 1, answer >= 0
      a = 1 + Math.floor(Math.random() * range);              // 1..range
      b = 1 + Math.floor(Math.random() * a);                  // 1..a
      answer = a - b;
    }
  }

  function speakPrompt(){
    Pop.speak(WORDS[a-1] + (op === "+" ? " plus " : " take away ") + WORDS[b-1] + "?");
  }

  function renderObjects(){
    objrow.innerHTML = "";
    if(op === "+"){
      // a objects then b objects of the same kind
      for(var i=0;i<a;i++) objrow.appendChild(Pop.el("span", { "class":"obj", text: obj }));
      for(var j=0;j<b;j++) objrow.appendChild(Pop.el("span", { "class":"obj", text: obj }));
    } else {
      // show all a, fade the last b (taken away)
      for(var k=0;k<a;k++){
        objrow.appendChild(Pop.el("span", { "class":"obj" + (k >= a - b ? " gone" : ""), text: obj }));
      }
    }
  }

  function newRound(){
    locked = false;
    makeProblem();
    obj = OBJECTS[Math.floor(Math.random() * OBJECTS.length)];
    var col = Pop.color(pos);
    card.style.setProperty("--c", col[0]);
    card.style.setProperty("--c-dark", col[1]);
    sumEl.textContent = a + " " + op + " " + b;
    renderObjects();

    // 3 answer choices: answer + 2 distractors (0..range)
    var pool = [];
    for(var n=0; n<=range; n++){ if(n !== answer) pool.push(n); }
    pool = Pop.shuffle(pool).slice(0, 2);
    var set = Pop.shuffle(pool.concat([answer]));

    choicesEl.innerHTML = "";
    set.forEach(function(num){
      var bn = Pop.el("button", { "class":"choice", text: String(num), "aria-label": String(num) });
      bn.addEventListener("click", function(){ choose(bn, num); });
      choicesEl.appendChild(bn);
    });

    hint.textContent = "👆 what is the answer?";
    counter.textContent = (pos+1) + " / " + ROUNDS;
    bar.style.width = ((pos+1)/ROUNDS*100) + "%";
    setTimeout(speakPrompt, 250);
  }

  function choose(btn, num){
    if(locked) return;
    var correct = (num === answer);
    Pop.progress.record("addtake", a + op + b, correct);
    if(correct){
      locked = true;
      btn.classList.add("correct");
      Pop.sparkle(card);
      score++; scoreEl.textContent = "⭐ " + score;
      var ansWord = answer === 0 ? "zero" : WORDS[answer-1];
      Pop.speak(WORDS[a-1] + (op === "+" ? " plus " : " take away ") + WORDS[b-1] + " is " + ansWord);
      setTimeout(next, 1100);
    } else {
      btn.classList.add("wrong", "dim");
      hint.textContent = "Not quite — count the pictures!";
      Pop.speak("Try again.");
      setTimeout(function(){ btn.classList.remove("wrong"); }, 420);
    }
  }

  function next(){
    pos++;
    if(pos >= ROUNDS){
      Pop.sparkle(card);
      Pop.speak("Brilliant counting!");
      pos = 0;
    }
    newRound();
  }

  card.addEventListener("click", speakPrompt);

  $("rangeBtn").addEventListener("click", function(){
    range = range === 10 ? 20 : 10;
    this.textContent = "to " + range;
    this.setAttribute("aria-pressed", String(range === 20));
    newRound();
  });

  var soundBtn = $("soundBtn");
  soundBtn.setAttribute("aria-pressed", String(Pop.getSound()));
  soundBtn.innerHTML = Pop.getSound() ? "🔊 Sound" : "🔇 Sound";
  soundBtn.addEventListener("click", function(){
    var on = !Pop.getSound(); Pop.setSound(on);
    this.setAttribute("aria-pressed", String(on));
    this.innerHTML = on ? "🔊 Sound" : "🔇 Sound";
  });

  newRound();
})();
</script>
</body>
</html>
