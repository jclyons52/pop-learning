<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Skip Count · Pop Learning</title>
<link rel="stylesheet" href="../shared/pop.css" />
<style>
  #card{ aspect-ratio:1/0.82; gap:14px; }
  .seq{
    display:flex; flex-wrap:wrap; gap:clamp(8px,3vw,16px);
    justify-content:center; align-items:center;
    max-width:92%;
  }
  .term{
    background:#fff; color:var(--ink);
    font-weight:700; line-height:1;
    font-size:clamp(1.8rem,8vw,2.8rem);
    border-radius:18px; padding:clamp(8px,3vw,16px) clamp(12px,4vw,22px);
    box-shadow:0 5px 0 rgba(0,0,0,.12);
  }
  .term.blank{
    background:rgba(255,255,255,.32); color:#fff;
    box-shadow:inset 0 0 0 3px rgba(255,255,255,.7);
  }
  .prompt-say{
    margin-top:2px; border:none; cursor:pointer;
    background:rgba(255,255,255,.92); color:var(--ink);
    font-family:var(--font); font-weight:700; font-size:clamp(.95rem,4vw,1.2rem);
    border-radius:999px; padding:9px 18px; box-shadow:0 4px 0 rgba(0,0,0,.14);
    display:inline-flex; align-items:center; gap:8px;
  }
  .prompt-say:active{ transform:translateY(4px); box-shadow:0 0 0 rgba(0,0,0,.14); }

  .choices{
    display:grid; grid-template-columns:repeat(3, 1fr);
    gap:clamp(8px,3vw,16px);
    width:min(86vw, 420px);
  }
  .choice{
    border:none; cursor:pointer;
    aspect-ratio:1/1; border-radius:22px;
    background:#fff; color:var(--ink);
    font-family:var(--font); font-weight:700;
    font-size:clamp(2.2rem,11vw,3.4rem); line-height:1;
    display:grid; place-items:center;
    box-shadow:0 7px 0 var(--shadow);
    transition:transform .1s ease, box-shadow .1s ease, background .15s ease;
  }
  .choice:active{ transform:translateY(5px); box-shadow:0 2px 0 var(--shadow); }
  .choice:focus-visible{ outline:3px solid #4DABF7; outline-offset:2px; }
  .choice.correct{ background:#37B24D; color:#fff; box-shadow:0 7px 0 #2B8A3E; animation:pop .42s cubic-bezier(.34,1.56,.64,1); }
  .choice.wrong{ background:#FA5252; color:#fff; box-shadow:0 7px 0 #D23B3B; animation:shake .4s; }
  .choice.dim{ opacity:.35; pointer-events:none; }
  @keyframes shake{ 0%,100%{ transform:translateX(0); } 20%{ transform:translateX(-7px); } 40%{ transform:translateX(7px); } 60%{ transform:translateX(-5px); } 80%{ transform:translateX(5px); } }

  .scorebar{ display:flex; align-items:center; gap:16px; font-weight:600; }
  .score{ font-size:1rem; color:var(--ink); }
</style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <a class="home" href="../index.html" aria-label="Back to all apps">🏠</a>
      <div class="titles">
        <h1>Skip&nbsp;<span>Count</span></h1>
        <p>Count by 2s, 5s and 10s</p>
      </div>
    </div>
    <div class="controls">
      <button class="ctrl" id="stepBtn" aria-label="Change counting step">2s</button>
      <button class="ctrl" id="soundBtn" aria-pressed="true" aria-label="Toggle sound">🔊 Sound</button>
    </div>
  </header>

  <main class="stage">
    <button class="card" id="card" aria-label="Sequence card. Tap to hear it again.">
      <div class="seq" id="seq"></div>
      <span class="prompt-say">🔊 Say it again</span>
    </button>
    <div class="choices" id="choices" aria-label="Tap the missing number"></div>
    <div class="tap-hint" id="hint">👆 which number is missing?</div>
  </main>

  <footer class="bottom">
    <div class="scorebar">
      <span class="score" id="score">⭐ 0</span>
      <span class="counter" id="counter">1 / 10</span>
    </div>
    <div class="progress"><i id="bar"></i></div>
  </footer>

<script src="../shared/pop.js"></script>
<script src="../shared/data.js"></script>
<script>
(function(){
  "use strict";
  var $ = Pop.$;
  var ROUNDS = 10;

  var pos = 0, score = 0, locked = false, step = 2;
  var terms = [], blankIdx = 1, missing = 4;
  var card=$("card"), seqEl=$("seq"), choicesEl=$("choices"),
      hint=$("hint"), scoreEl=$("score"), counter=$("counter"), bar=$("bar");

  function speakPrompt(){
    // count the sequence aloud, saying "what?" for the blank
    var parts = terms.map(function(t, i){
      return { text: i === blankIdx ? "what?" : String(t), gap: 220 };
    });
    Pop.speakSeq(parts);
  }

  function speakFull(){
    var parts = terms.map(function(t){ return { text: String(t), gap: 220 }; });
    Pop.speakSeq(parts);
  }

  function newRound(){
    locked = false;
    var col = Pop.color(pos);
    card.style.setProperty("--c", col[0]);
    card.style.setProperty("--c-dark", col[1]);

    // 4-term sequence starting at the step: step, 2*step, 3*step, 4*step
    terms = [step, step*2, step*3, step*4];
    blankIdx = 1 + Math.floor(Math.random() * 3);   // hide term 2, 3 or 4 (index 1..3)
    missing = terms[blankIdx];

    seqEl.innerHTML = "";
    terms.forEach(function(t, i){
      if(i === blankIdx){
        seqEl.appendChild(Pop.el("div", { "class":"term blank", text: "?" }));
      } else {
        seqEl.appendChild(Pop.el("div", { "class":"term", text: String(t) }));
      }
    });

    // 3 choices: the missing term + 2 distractors (nearby multiples & off-by-one)
    var poolMap = {};
    for(var m=1; m<=8; m++){ var v = step*m; if(v !== missing) poolMap[v] = true; }
    if(missing - 1 > 0) poolMap[missing - 1] = true;
    poolMap[missing + 1] = true;
    var distractors = Pop.shuffle(Object.keys(poolMap).map(Number)).slice(0, 2);
    var set = Pop.shuffle(distractors.concat([missing]));

    choicesEl.innerHTML = "";
    set.forEach(function(num){
      var b = Pop.el("button", { "class":"choice", text: String(num), "aria-label": String(num) });
      b.addEventListener("click", function(){ choose(b, num); });
      choicesEl.appendChild(b);
    });

    hint.textContent = "👆 which number is missing?";
    counter.textContent = (pos+1) + " / " + ROUNDS;
    bar.style.width = ((pos+1)/ROUNDS*100) + "%";
    setTimeout(speakPrompt, 250);
  }

  function choose(btn, num){
    if(locked) return;
    var correct = (num === missing);
    Pop.progress.record("skip", step + "x" + missing, correct);
    if(correct){
      locked = true;
      btn.classList.add("correct");
      // fill the blank in
      var blankNode = seqEl.children[blankIdx];
      blankNode.className = "term";
      blankNode.textContent = String(missing);
      Pop.sparkle(card);
      score++; scoreEl.textContent = "⭐ " + score;
      setTimeout(speakFull, 200);
      setTimeout(next, 1400);
    } else {
      btn.classList.add("wrong", "dim");
      hint.textContent = "Not quite — count up by " + step + "s!";
      Pop.speak("Try again.");
      setTimeout(function(){ btn.classList.remove("wrong"); }, 420);
    }
  }

  function next(){
    pos++;
    if(pos >= ROUNDS){
      Pop.sparkle(card);
      Pop.speak("Super skip counting!");
      pos = 0;
    }
    newRound();
  }

  card.addEventListener("click", speakPrompt);

  $("stepBtn").addEventListener("click", function(){
    step = step === 2 ? 5 : step === 5 ? 10 : 2;
    this.textContent = step + "s";
    newRound();
  });

  var soundBtn = $("soundBtn");
  soundBtn.setAttribute("aria-pressed", String(Pop.getSound()));
  soundBtn.innerHTML = Pop.getSound() ? "🔊 Sound" : "🔇 Sound";
  soundBtn.addEventListener("click", function(){
    var on = !Pop.getSound(); Pop.setSound(on);
    this.setAttribute("aria-pressed", String(on));
    this.innerHTML = on ? "🔊 Sound" : "🔇 Sound";
  });

  newRound();
})();
</script>
</body>
</html>
