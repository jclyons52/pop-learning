<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>First Sounds · Pop Learning</title>
<link rel="stylesheet" href="../shared/pop.css" />
<style>
  /* prompt card: a picture clue + a big replay button */
  #card{ aspect-ratio:1/0.78; gap:6px; }
  .prompt-emoji{ font-size:clamp(3.4rem,18vw,6rem); line-height:1; }
  .prompt-say{
    margin-top:6px; border:none; cursor:pointer;
    background:rgba(255,255,255,.92); color:var(--ink);
    font-family:var(--font); font-weight:700; font-size:clamp(.95rem,4vw,1.2rem);
    border-radius:999px; padding:9px 18px; box-shadow:0 4px 0 rgba(0,0,0,.14);
    display:inline-flex; align-items:center; gap:8px;
  }
  .prompt-say:active{ transform:translateY(4px); box-shadow:0 0 0 rgba(0,0,0,.14); }

  .choices{
    display:grid; grid-template-columns:repeat(3, 1fr);
    gap:clamp(8px,3vw,16px);
    width:min(86vw, 420px);
  }
  .choices.six{ grid-template-columns:repeat(3, 1fr); }
  .choice{
    border:none; cursor:pointer;
    aspect-ratio:1/1; border-radius:22px;
    background:#fff; color:var(--ink);
    font-family:var(--font); font-weight:700; text-transform:lowercase;
    font-size:clamp(2.4rem,12vw,3.6rem); line-height:1;
    display:grid; place-items:center;
    box-shadow:0 7px 0 var(--shadow);
    transition:transform .1s ease, box-shadow .1s ease, background .15s ease;
  }
  .choice:active{ transform:translateY(5px); box-shadow:0 2px 0 var(--shadow); }
  .choice:focus-visible{ outline:3px solid #4DABF7; outline-offset:2px; }
  .choice.correct{ background:#37B24D; color:#fff; box-shadow:0 7px 0 #2B8A3E; animation:pop .42s cubic-bezier(.34,1.56,.64,1); }
  .choice.wrong{ background:#FA5252; color:#fff; box-shadow:0 7px 0 #D23B3B; animation:shake .4s; }
  .choice.dim{ opacity:.35; pointer-events:none; }
  @keyframes shake{ 0%,100%{ transform:translateX(0); } 20%{ transform:translateX(-7px); } 40%{ transform:translateX(7px); } 60%{ transform:translateX(-5px); } 80%{ transform:translateX(5px); } }

  .scorebar{ display:flex; align-items:center; gap:16px; font-weight:600; }
  .score{ font-size:1rem; color:var(--ink); }
</style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <a class="home" href="../index.html" aria-label="Back to all apps">🏠</a>
      <div class="titles">
        <h1>First&nbsp;<span>Sounds</span></h1>
        <p>What sound does it start with?</p>
      </div>
    </div>
    <div class="controls">
      <button class="ctrl" id="hardBtn" aria-pressed="false" aria-label="More choices">3 choices</button>
      <button class="ctrl" id="soundBtn" aria-pressed="true" aria-label="Toggle sound">🔊 Sound</button>
    </div>
  </header>

  <main class="stage">
    <button class="card" id="card" aria-label="Hear the word again">
      <span class="prompt-emoji" id="promptEmoji">🍎</span>
      <span class="prompt-say">🔊 Listen again</span>
    </button>
    <div class="choices" id="choices" aria-label="Tap the first letter"></div>
    <div class="tap-hint" id="hint">👆 which letter does it start with?</div>
  </main>

  <footer class="bottom">
    <div class="scorebar">
      <span class="score" id="score">⭐ 0</span>
      <span class="counter" id="counter">1 / 1</span>
    </div>
    <div class="progress"><i id="bar"></i></div>
  </footer>

<script src="../shared/pop.js"></script>
<script src="../shared/data.js"></script>
<script>
(function(){
  "use strict";
  var $ = Pop.$;

  // Build a pool of [word, emoji] from cvc + the letters dataset words.
  var POOL = Pop.data.cvc.map(function(w){ return [w[0], w[1]]; })
    .concat(Pop.data.letters.map(function(L){ return [L[1], L[2]]; }));

  // de-dupe by word so the same word never appears twice in the pool
  (function(){
    var seen = {}, out = [];
    POOL.forEach(function(p){
      var k = p[0].toLowerCase();
      if(!seen[k]){ seen[k] = 1; out.push(p); }
    });
    POOL = out;
  })();

  var ALPHA = "abcdefghijklmnopqrstuvwxyz".split("");

  function firstLetter(word){ return word.charAt(0).toLowerCase(); }

  var order = Pop.shuffle(POOL.map(function(_,i){ return i; }));
  var pos = 0, score = 0, choiceCount = 3, locked = false;
  var card=$("card"), promptEmoji=$("promptEmoji"), choicesEl=$("choices"),
      hint=$("hint"), scoreEl=$("score"), counter=$("counter"), bar=$("bar");

  function target(){ return POOL[ order[pos] ]; }

  function speakPrompt(){
    Pop.speak(target()[0]);
  }

  function newRound(){
    locked = false;
    var item = target(), word = item[0], first = firstLetter(word);
    var col = Pop.color(order[pos]);
    card.style.setProperty("--c", col[0]);
    card.style.setProperty("--c-dark", col[1]);
    promptEmoji.textContent = item[1];

    // distractor letters: random letters that aren't the first letter
    var others = Pop.shuffle(ALPHA.filter(function(l){ return l !== first; }))
      .slice(0, choiceCount - 1);
    var set = Pop.shuffle(others.concat([first]));

    choicesEl.className = "choices" + (choiceCount > 4 ? " six" : "");
    choicesEl.style.gridTemplateColumns = "repeat(" + Math.min(choiceCount, 3) + ", 1fr)";
    choicesEl.innerHTML = "";
    set.forEach(function(letter){
      var b = Pop.el("button", { "class":"choice", text: letter, "aria-label": "Letter " + letter.toUpperCase() });
      b.addEventListener("click", function(){ choose(b, letter); });
      choicesEl.appendChild(b);
    });

    hint.textContent = "👆 which letter does it start with?";
    counter.textContent = (pos+1) + " / " + POOL.length;
    bar.style.width = ((pos+1)/POOL.length*100) + "%";
    setTimeout(speakPrompt, 250);
  }

  function choose(btn, letter){
    if(locked) return;
    var word = target()[0], first = firstLetter(word);
    var correct = (letter === first);
    Pop.progress.record("first-sounds", first, correct);
    if(correct){
      locked = true;
      btn.classList.add("correct");
      Pop.sparkle(card);
      score++; scoreEl.textContent = "⭐ " + score;
      Pop.speak("Yes! " + word + " starts with " + first + "!");
      setTimeout(next, 1100);
    } else {
      btn.classList.add("wrong", "dim");
      hint.textContent = "Not quite — listen again and try!";
      Pop.speak("Try again.");
      setTimeout(function(){ btn.classList.remove("wrong"); }, 420);
    }
  }

  function next(){
    pos++;
    if(pos >= POOL.length){
      Pop.sparkle(card);
      Pop.speak("Great job! You found them all!");
      order = Pop.shuffle(order); pos = 0;
    }
    newRound();
  }

  card.addEventListener("click", speakPrompt);

  $("hardBtn").addEventListener("click", function(){
    choiceCount = choiceCount===3 ? 4 : choiceCount===4 ? 6 : 3;
    this.textContent = choiceCount + " choices";
    this.setAttribute("aria-pressed", String(choiceCount>3));
    newRound();
  });

  var soundBtn = $("soundBtn");
  soundBtn.setAttribute("aria-pressed", String(Pop.getSound()));
  soundBtn.innerHTML = Pop.getSound() ? "🔊 Sound" : "🔇 Sound";
  soundBtn.addEventListener("click", function(){
    var on = !Pop.getSound(); Pop.setSound(on);
    this.setAttribute("aria-pressed", String(on));
    this.innerHTML = on ? "🔊 Sound" : "🔇 Sound";
  });

  newRound();
})();
</script>
</body>
</html>
