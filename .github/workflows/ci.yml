name: CI

on:
  push:
  pull_request:

# Deno-only: format, type-check and test with Deno's own bundled toolchain.
# No npm, nothing pulled from the npm registry.
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Format check
        run: deno task fmt:check

      - name: Syntax check (all inline + shared scripts parse)
        run: deno task syntax

      - name: Validate content, contract & offline cache
        run: deno task validate

      - name: Unit tests (plan logic)
        run: deno task test

      - name: Type-check (Deno, JSDoc + bundled TypeScript)
        run: deno task check
