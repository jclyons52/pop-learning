<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Pop Learning · fun reading & counting for little kids</title>
<meta name="description" content="A friendly set of phonics, sight-word, blending and counting games for kids learning to read. Free, works offline, installs as an app." />
<link rel="stylesheet" href="shared/pop.css" />
<style>
  .hero{ text-align:center; padding:clamp(22px,6vh,48px) 18px 6px; }
  .hero h1{
    margin:0; font-weight:700; letter-spacing:.5px;
    font-size:clamp(2.1rem,9vw,3.4rem);
  }
  .hero h1 span{ color:var(--pop); }
  .hero p{ margin:8px 0 0; color:var(--ink-soft); font-weight:500; font-size:clamp(.95rem,3.6vw,1.15rem); }

  .grid{
    flex:1;
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(min(100%, 250px), 1fr));
    gap:clamp(14px,3vw,22px);
    width:min(96vw, 920px);
    margin:clamp(18px,4vh,34px) auto;
    padding:0 18px calc(18px + env(safe-area-inset-bottom));
    align-content:start;
  }
  .tile{
    text-decoration:none;
    border-radius:30px;
    background:var(--c);
    box-shadow:0 12px 0 var(--c-dark), 0 22px 34px rgba(43,36,64,.24);
    color:#fff;
    padding:22px 22px 26px;
    display:flex; flex-direction:column; gap:8px;
    min-height:168px;
    transition:transform .1s ease, box-shadow .1s ease;
  }
  .tile:active{ transform:translateY(9px); box-shadow:0 3px 0 var(--c-dark), 0 10px 18px rgba(43,36,64,.2); }
  .tile:focus-visible{ outline:4px solid var(--ink); outline-offset:4px; }
  .tile .ico{ font-size:clamp(2.6rem,12vw,3.4rem); line-height:1; }
  .tile .name{ font-size:clamp(1.25rem,5.5vw,1.6rem); font-weight:700; }
  .tile .desc{ font-size:.95rem; font-weight:500; opacity:.92; line-height:1.25; }
  .tile .go{ margin-top:auto; font-weight:600; font-size:.9rem; opacity:.92; }

  .footer{ text-align:center; padding:0 18px calc(22px + env(safe-area-inset-bottom)); color:var(--ink-soft); }
  .installRow{ display:flex; justify-content:center; gap:10px; flex-wrap:wrap; margin-bottom:12px; min-height:0; }
  .install{
    border:none; cursor:pointer; font-family:var(--font); font-weight:700;
    background:#fff; color:var(--ink); border-radius:999px;
    padding:11px 20px; font-size:.95rem; box-shadow:0 4px 0 var(--shadow);
    display:none; align-items:center; gap:8px;
    transition:transform .08s ease, box-shadow .08s ease;
  }
  .install:active{ transform:translateY(4px); box-shadow:0 0 0 var(--shadow); }
  .ios-hint{ font-size:.85rem; max-width:30rem; margin:0 auto; line-height:1.35; }
  .credit{ font-size:.8rem; margin-top:10px; }
</style>
</head>
<body>
  <header class="hero">
    <h1>Pop&nbsp;<span>Learning</span></h1>
    <p>Tap, listen, learn — little games for early readers 🦉</p>
  </header>

  <main class="grid" id="grid" aria-label="Choose a game"></main>

  <footer class="footer">
    <div class="installRow">
      <button class="install" id="installBtn">⬇️ Install as an app</button>
    </div>
    <p class="ios-hint" id="iosHint" hidden>On iPhone/iPad: tap the <b>Share</b> button, then <b>Add to Home Screen</b> to install.</p>
    <p class="credit">Works offline · no ads · no sign-up. Made with ❤️ for little learners.</p>
  </footer>

<script src="shared/pop.js"></script>
<script>
(function(){
  "use strict";
  var APPS = [
    { href:"apps/alphabet-pop.html", ico:"🔤", name:"Alphabet Pop", desc:"Letters and their sounds, A to Z.", c:0 },
    { href:"apps/sound-match.html",  ico:"👂", name:"Sound Match",  desc:"Hear a sound — find the letter.", c:4 },
    { href:"apps/sight-words.html",  ico:"👀", name:"Sight Words",  desc:"The everyday words to know by heart.", c:1 },
    { href:"apps/sound-it-out.html", ico:"🪄", name:"Sound It Out", desc:"Blend the sounds to read a word.", c:3 },
    { href:"apps/word-families.html",ico:"👨‍👩‍👧", name:"Word Families", desc:"cat, hat, bat — swap the first sound.", c:5 },
    { href:"apps/counting-pop.html", ico:"🔢", name:"Counting Pop", desc:"Count along from 1 to 20.", c:6 }
  ];
  var grid = Pop.$("grid");
  APPS.forEach(function(a){
    var col = Pop.color(a.c);
    var t = Pop.el("a", { "class":"tile", href:a.href });
    t.style.setProperty("--c", col[0]);
    t.style.setProperty("--c-dark", col[1]);
    t.innerHTML =
      '<span class="ico">'+a.ico+'</span>' +
      '<span class="name">'+a.name+'</span>' +
      '<span class="desc">'+a.desc+'</span>' +
      '<span class="go">Play →</span>';
    grid.appendChild(t);
  });

  // Install-as-app support
  var deferred = null, installBtn = Pop.$("installBtn"), iosHint = Pop.$("iosHint");
  window.addEventListener("beforeinstallprompt", function(e){
    e.preventDefault(); deferred = e; installBtn.style.display = "inline-flex";
  });
  installBtn.addEventListener("click", function(){
    if(!deferred) return;
    deferred.prompt();
    deferred.userChoice.finally(function(){ deferred = null; installBtn.style.display = "none"; });
  });
  window.addEventListener("appinstalled", function(){ installBtn.style.display = "none"; });

  // iOS Safari has no install prompt — show the manual hint instead
  var isIOS = /iP(hone|ad|od)/.test(navigator.platform) ||
    (navigator.userAgent.indexOf("Mac")>-1 && "ontouchend" in document);
  var standalone = window.matchMedia("(display-mode: standalone)").matches || window.navigator.standalone;
  if(isIOS && !standalone) iosHint.hidden = false;
})();
</script>
</body>
</html>
